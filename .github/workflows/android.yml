name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          npm install
          npm run build
      - name: Build Android APK
        run: |
          npm install @capacitor/android
          cd frontend
          rm -rf android
          npx cap add android
          npx cap sync android
          cd android
          # Ensure wrapper exists, if not, generate it (version compatible with Capacitor 6)
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          rm -rf .gradle .idea build app/build
          chmod +x gradlew
          ./gradlew clean assembleDebug -I ../gradle-init.gradle -Dgradle.user.home=../gradle-cache --refresh-dependencies --no-daemon --info
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
